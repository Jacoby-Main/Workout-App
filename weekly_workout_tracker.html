  .app { padding: 0 0 2rem; }

  .header { padding: 1.25rem 1.25rem 0.75rem; border-bottom: 0.5px solid var(--border); }

  .header-title { font-family: 'Barlow Condensed', sans-serif; font-size: 26px; font-weight: 700; letter-spacing: 0.02em; text-transform: uppercase; }

  .goal-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); }

  .day-tabs { display: flex; gap: 0; overflow-x: auto; border-bottom: 0.5px solid var(--border); padding: 0 1.25rem; scrollbar-width: none; }
  .day-tabs::-webkit-scrollbar { display: none; }
  .day-tab { flex-shrink: 0; padding: 10px 14px 8px; cursor: pointer; font-size: 12px; font-weight: 500; color: var(--muted); border-bottom: 2px solid transparent; transition: all 0.15s; white-space: nowrap; }
  .day-tab:hover { color: var(--text); }
  .day-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .day-tab.rest-tab.active { color: var(--muted); border-bottom-color: var(--muted); }
  .day-badge { display: inline-block; font-size: 9px; text-transform: uppercase; letter-spacing: 0.06em; margin-left: 4px; padding: 1px 5px; border-radius: 4px; background: var(--card); }

  .day-content { padding: 1rem 1.25rem; }

  .day-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 1rem; }
  .day-title { font-family: 'Barlow Condensed', sans-serif; font-size: 28px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.02em; line-height: 1; }

  .day-meta { text-align: right; }
  .day-sets { font-size: 11px; color: var(--muted); }

  .exercises { display: flex; flex-direction: column; gap: 10px; }

  .exercise-card { background: var(--card); border: 0.5px solid var(--border); border-radius: 10px; overflow: hidden; cursor: pointer; transition: border-color 0.15s; }
  .exercise-card:hover { border-color: var(--color-border-secondary); }
  .exercise-card.expanded { border-color: var(--accent); }

  .exercise-row { display: flex; align-items: center; gap: 12px; padding: 11px 14px; }
  .exercise-img { width: 50px; height: 50px; border-radius: 6px; background: var(--dark); border: 0.5px solid var(--border); object-fit: cover; flex-shrink: 0; display: flex; align-items: center; justify-content: center; overflow: hidden; }
  .exercise-img svg { width: 38px; height: 38px; }
  .exercise-info { flex: 1; min-width: 0; }
  .exercise-name { font-weight: 500; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .exercise-sets { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .muscle-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; }
  .muscle-tag { font-size: 10px; padding: 2px 6px; border-radius: 4px; background: var(--dark); border: 0.5px solid var(--border); color: var(--muted); }
  .chevron { color: var(--muted); font-size: 12px; transition: transform 0.2s; flex-shrink: 0; }
  .exercise-card.expanded .chevron { transform: rotate(180deg); }

  .exercise-detail { border-top: 0.5px solid var(--border); padding: 12px 14px; display: none; }
  .exercise-card.expanded .exercise-detail { display: block; }
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
  .detail-stat { background: var(--dark); border-radius: 6px; padding: 8px 10px; }
  .detail-stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); }
  .detail-stat-val { font-size: 16px; font-weight: 500; font-family: 'Barlow Condensed', sans-serif; margin-top: 1px; }
  .tip-box { background: var(--dark); border-left: 2px solid var(--accent2); border-radius: 4px; padding: 8px 10px; font-size: 12px; color: var(--muted); line-height: 1.5; }
  .tip-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--accent2); font-weight: 500; margin-bottom: 3px; }

  .muscle-diagram { position: relative; width: 100%; margin: 0 auto 1rem; }

  .rest-screen { text-align: center; padding: 3rem 1rem; }
  .rest-icon { font-size: 48px; margin-bottom: 1rem; }
  .rest-title { font-family: 'Barlow Condensed', sans-serif; font-size: 28px; font-weight: 700; text-transform: uppercase; }
  .rest-tip { font-size: 13px; color: var(--muted); margin-top: 0.5rem; max-width: 260px; margin-left: auto; margin-right: auto; line-height: 1.6; }

  .progress-bar { height: 100%; background: var(--accent); border-radius: 20px; transition: width 0.3s; }

  .section-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); font-weight: 500; margin-bottom: 8px; }

  .today-badge { background: var(--accent); color: #fff; font-size: 9px; text-transform: uppercase; letter-spacing: 0.06em; padding: 2px 6px; border-radius: 3px; }
</style>

function getToday() {
  const d = new Date().getDay();
  if (d === 0) return 6;
  return d - 1;
}

let activeDay = Math.min(getToday(), 6);
let expandedExercise = null;

function renderTabs() {
  const container = document.getElementById('day-tabs');
  container.innerHTML = '';
  days.forEach((day, i) => {
    const tab = document.createElement('div');
    const isToday = i === getToday();
    tab.className = `day-tab${i === activeDay ? ' active' : ''}${day.rest ? ' rest-tab' : ''}`;
    tab.innerHTML = `${day.short}${isToday ? ' <span class="today-badge" style="font-size:8px;padding:1px 4px;">Today</span>' : ''}`;
    tab.onclick = () => { activeDay = i; expandedExercise = null; renderTabs(); renderContent(); };
    container.appendChild(tab);
  });
}

function renderContent() {
  const day = days[activeDay];
  const container = document.getElementById('day-content');

  if (day.rest) {
    container.innerHTML = `
      <div class="rest-screen">
        <div class="rest-icon">🛌</div>
        <div class="rest-title">${day.name} — Rest Day</div>
        <div class="rest-tip">Your muscles grow during recovery. Get 7–9 hours of sleep, stay hydrated, and consider a light walk or stretching session.</div>
        <div style="margin-top:2rem;padding:1rem;background:var(--card);border-radius:10px;border:0.5px solid var(--border);text-align:left;max-width:300px;margin-left:auto;margin-right:auto;">
          <div class="section-label">Recomp tip for today</div>
          <div style="font-size:13px;color:var(--muted);line-height:1.6;">Aim for 0.7–1g of protein per lb of bodyweight. At 165 lbs that's ~120–165g daily to preserve muscle while in a deficit.</div>
        </div>
      </div>`;
    return;
  }

  const totalSets = day.exercises.reduce((s, e) => s + parseInt(e.sets), 0);

  let html = `
    <div class="day-header">
      <div>
        <div class="day-title">${day.name}</div>
        <div class="day-focus">${day.focus}</div>
      </div>
      <div class="day-meta">
        <div class="day-sets">${day.exercises.length} exercises</div>
        <div class="day-sets">${totalSets} total sets</div>
      </div>
    </div>
    <div style="font-size:12px;color:var(--muted);background:var(--card);border-radius:8px;padding:8px 10px;margin-bottom:1rem;border-left:2px solid var(--accent2);">${day.tip_day}</div>
    <div class="section-label">Exercises — tap to expand</div>
    <div class="exercises">`;

  day.exercises.forEach((ex, i) => {
    const expanded = expandedExercise === i;
    html += `
      <div class="exercise-card${expanded ? ' expanded' : ''}" onclick="toggleExercise(${i})">
        <div class="exercise-row">
          <div class="exercise-img">${visuals[ex.visual] || ''}</div>
          <div class="exercise-info">
            <div class="exercise-name">${ex.name}</div>
            <div class="exercise-sets">${ex.sets} sets × ${ex.reps} reps · Rest ${ex.rest}</div>
            <div class="muscle-tags">${ex.muscles.map(m => `<span class="muscle-tag">${m}</span>`).join('')}</div>
          </div>
          <div class="chevron">▼</div>
        </div>
        ${expanded ? `
        <div class="exercise-detail">
          <div class="detail-grid">
            <div class="detail-stat"><div class="detail-stat-label">Sets</div><div class="detail-stat-val">${ex.sets}</div></div>
            <div class="detail-stat"><div class="detail-stat-label">Reps</div><div class="detail-stat-val">${ex.reps}</div></div>
            <div class="detail-stat"><div class="detail-stat-label">Rest</div><div class="detail-stat-val">${ex.rest}</div></div>
            <div class="detail-stat"><div class="detail-stat-label">Target</div><div class="detail-stat-val" style="font-size:13px;">${ex.muscles[0]}</div></div>
          </div>
          <div class="tip-box"><div class="tip-label">Form tip</div>${ex.tip}</div>
        </div>` : ''}
      </div>`;
  });

  html += `</div>`;
  container.innerHTML = html;
}

function toggleExercise(i) {
  expandedExercise = expandedExercise === i ? null : i;
  renderContent();
}

renderTabs();
renderContent();
</script>
